services:
  mailpit:
    image: axllent/mailpit:latest
    container_name: caninde_mailpit
    restart: unless-stopped
    ports:
      - '1025:1025' # SMTP — usado pelo Laravel
      - '8025:8025' # UI web — abre no browser para ver os emails
    environment:
      MP_MAX_MESSAGES: 500
      MP_SMTP_AUTH_ACCEPT_ANY: 1
      MP_SMTP_AUTH_ALLOW_INSECURE: 1
